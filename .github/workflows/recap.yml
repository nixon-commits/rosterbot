name: Weekly Recap

on:
  schedule:
    - cron: '0 11 * * 1'   # 7am ET Monday — after Sunday's late games settle
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Restore Fantrax snapshot cache
        uses: actions/cache@v5
        with:
          path: .cache
          key: recap-${{ github.run_id }}
          restore-keys: |
            recap-
            projections-

      - name: Restore Fantrax session
        uses: actions/cache@v5
        with:
          path: .fantrax-cache
          key: fantrax-session-${{ github.run_id }}
          restore-keys: fantrax-session-

      - uses: browser-actions/setup-chrome@v2

      - name: Build recap site
        run: go run . recap-site --out dist
        env:
          FANTRAX_USERNAME: ${{ secrets.FANTRAX_USERNAME }}
          FANTRAX_PASSWORD: ${{ secrets.FANTRAX_PASSWORD }}
          FANTRAX_LEAGUE_ID: ${{ secrets.FANTRAX_LEAGUE_ID }}
          FANTRAX_TEAM_ID: ${{ secrets.FANTRAX_TEAM_ID }}
          FANTRAX_IL_SLOTS: ${{ secrets.FANTRAX_IL_SLOTS }}
          FANTRAX_MINORS_SLOTS: ${{ secrets.FANTRAX_MINORS_SLOTS }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Send Pushover notification
        if: success()
        run: |
          curl -s -f \
            --form-string "token=$PUSHOVER_APP_TOKEN" \
            --form-string "user=$PUSHOVER_USER_KEY" \
            --form-string "title=RosterBot: Recap updated" \
            --form-string "message=Latest week recap deployed — tap to view." \
            --form-string "url=${{ steps.deployment.outputs.page_url }}" \
            --form-string "url_title=Open Recap" \
            --form-string "priority=0" \
            https://api.pushover.net/1/messages.json
        env:
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
