name: Waiver Claims Recap

on:
  schedule:
    - cron: '0 14 * * *'   # 2pm UTC (10am ET) — after waivers.yml (1pm) warms Savant cache
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print report but skip Pushover notification'
        type: boolean
        default: false

jobs:
  claims:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore Fantrax session
        uses: actions/cache@v5
        with:
          path: .fantrax-cache
          key: fantrax-session-${{ github.run_id }}
          restore-keys: fantrax-session-

      - uses: browser-actions/setup-chrome@v2

      - name: Restore data cache
        uses: actions/cache@v5
        with:
          path: |
            .cache
            .waivers/claims
          key: claims-${{ github.run_id }}
          restore-keys: |
            claims-
            projections-

      - name: Recap waiver claims
        run: |
          FLAGS=""
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          if [ "${DRY_RUN:-false}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          go run . claims $FLAGS
        env:
          FANTRAX_USERNAME: ${{ secrets.FANTRAX_USERNAME }}
          FANTRAX_PASSWORD: ${{ secrets.FANTRAX_PASSWORD }}
          FANTRAX_LEAGUE_ID: ${{ secrets.FANTRAX_LEAGUE_ID }}
          FANTRAX_TEAM_ID: ${{ secrets.FANTRAX_TEAM_ID }}
          FANTRAX_IL_SLOTS: ${{ secrets.FANTRAX_IL_SLOTS }}
          FANTRAX_MINORS_SLOTS: ${{ secrets.FANTRAX_MINORS_SLOTS }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
