name: Optimize Lineup

on:
  schedule:
    - cron: '0 14-23 * * *'  # 6am–3pm PST (2pm–11pm UTC)
    - cron: '0 0-3 * * *'    # 4pm–7pm PST (12am–3am UTC next day)
  workflow_dispatch:           # on-demand trigger from GitHub Actions tab

jobs:
  optimize-lineup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Restore projection cache
        uses: actions/cache@v4
        with:
          path: |
            .cache
            .backtest/snapshots
          key: projections-${{ github.run_id }}
          restore-keys: projections-

      - name: Optimize lineup
        run: go run . optimize --matchup --archive-projections
        env:
          FANTRAX_USERNAME: ${{ secrets.FANTRAX_USERNAME }}
          FANTRAX_PASSWORD: ${{ secrets.FANTRAX_PASSWORD }}
          FANTRAX_COOKIES: ${{ secrets.FANTRAX_COOKIES }}
          FANTRAX_LEAGUE_ID: ${{ secrets.FANTRAX_LEAGUE_ID }}
          FANTRAX_TEAM_ID: ${{ secrets.FANTRAX_TEAM_ID }}
          FANTRAX_IL_SLOTS: ${{ secrets.FANTRAX_IL_SLOTS }}
          FANTRAX_MINORS_SLOTS: ${{ secrets.FANTRAX_MINORS_SLOTS }}
          GS_MAX: ${{ secrets.GS_MAX }}
          GS_MIN: ${{ secrets.GS_MIN }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
