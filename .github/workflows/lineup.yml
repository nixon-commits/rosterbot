name: Optimize Daily Lineup

on:
  schedule:
    - cron: '0 10 * * *'   # 10am UTC (6am ET) every day
  workflow_dispatch:         # on-demand trigger from GitHub Actions tab

jobs:
  optimize-lineup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser 2>/dev/null || \
          sudo apt-get install -y -qq chromium 2>/dev/null || true

      - name: Optimize lineup
        run: go run ./cmd
        env:
          FANTRAX_USERNAME: ${{ secrets.FANTRAX_USERNAME }}
          FANTRAX_PASSWORD: ${{ secrets.FANTRAX_PASSWORD }}
          FANTRAX_LEAGUE_ID: ${{ secrets.FANTRAX_LEAGUE_ID }}
          FANTRAX_TEAM_ID: ${{ secrets.FANTRAX_TEAM_ID }}
