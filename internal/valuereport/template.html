<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Team Value</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC" crossorigin="anonymous"></script>
<style>
  :root { --bg:#0f1115; --card:#181b22; --ink:#e6e8eb; --muted:#9aa0a8; --accent:#4f9dff; --warn:#ffb454; --good:#5fd38d; --bad:#ff6b6b; --line:#23262e; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
  header { padding:20px 24px; border-bottom:1px solid var(--line); }
  h1 { margin:0 0 4px; font-size:20px; }
  .sub { color:var(--muted); font-size:13px; }
  .sub a { color:var(--accent); text-decoration:none; }
  main { max-width:1100px; margin:0 auto; padding:20px 24px 60px; }
  .controls { display:flex; gap:24px; flex-wrap:wrap; align-items:center; margin:16px 0 20px; }
  .grp { display:flex; gap:6px; align-items:center; }
  .grp .lbl { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.05em; margin-right:4px; }
  button.seg { background:var(--card); color:var(--ink); border:1px solid #2a2e37; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:13px; }
  button.seg.active { background:var(--accent); border-color:var(--accent); color:#06101f; font-weight:600; }
  button.mini { background:transparent; color:var(--muted); border:1px solid #2a2e37; padding:4px 9px; border-radius:6px; cursor:pointer; font-size:12px; }
  button.mini:hover { color:var(--ink); }
  section.panel { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px; margin-top:20px; }
  section.panel h2 { margin:0 0 12px; font-size:15px; }
  .chartwrap { position:relative; height:420px; }
  .note { color:var(--warn); font-size:13px; margin:0 0 14px; padding:8px 12px; background:rgba(255,180,84,.08); border-left:3px solid var(--warn); border-radius:6px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:7px 8px; border-bottom:1px solid var(--line); }
  th { color:var(--muted); font-weight:600; }
  th.num,td.num { text-align:right; }
  td.num { font-variant-numeric:tabular-nums; }
  tr.lead td { background:rgba(95,211,141,.08); }
  tr.lead td:first-child { box-shadow:inset 3px 0 0 var(--good); }
  .team { display:flex; align-items:center; gap:8px; }
  .logo { width:20px; height:20px; border-radius:4px; object-fit:cover; background:#0d0f13; flex:0 0 auto; }
  .swatch { display:inline-block; width:12px; height:12px; border-radius:3px; flex:0 0 auto; }
  .cov { color:var(--muted); font-variant-numeric:tabular-nums; }
  .cov.warn { color:var(--warn); }
  .empty { color:var(--muted); padding:40px; text-align:center; }
  @media (max-width:600px){ .chartwrap{height:320px;} }
</style>
</head>
<body>
<header>
  <h1>Team Value</h1>
  <div class="sub" id="meta"></div>
</header>
<main>
  <div id="content"></div>
</main>
<script>
const DATA = {{.Data}};

const METRICS = [
  ["total",  "Total",  r => r.h_mlb + r.h_min + r.p_mlb + r.p_min],
  ["mlb",    "MLB",    r => r.h_mlb + r.p_mlb],
  ["minors", "Minors", r => r.h_min + r.p_min],
  ["hitter", "Hitter", r => r.h_mlb + r.h_min],
  ["pitcher","Pitcher",r => r.p_mlb + r.p_min],
];

function fmt(n){ return n.toLocaleString(); }

// index[teamID][dt] -> series row
function buildIndex(){
  const idx = {};
  for (const s of DATA.series){
    (idx[s.team] = idx[s.team] || {})[s.dt] = s;
  }
  return idx;
}

let chart = null;
let metric = "total";

function datasetsFor(metricKey){
  const fn = METRICS.find(m => m[0] === metricKey)[2];
  const idx = buildIndex();
  return DATA.teams.map(t => ({
    label: t.name || t.id,
    borderColor: t.color,
    backgroundColor: t.color,
    borderWidth: 2,
    pointRadius: DATA.dates.length <= 30 ? 2.5 : 0,
    pointHoverRadius: 4,
    tension: 0.2,
    spanGaps: true,
    data: DATA.dates.map(d => {
      const row = idx[t.id] && idx[t.id][d];
      return row ? fn(row) : null;
    }),
  }));
}

function metricLabel(){ return METRICS.find(m => m[0] === metric)[1]; }

function draw(){
  const ctx = document.getElementById("valueChart");
  const cfg = {
    type: "line",
    data: { labels: DATA.dates, datasets: datasetsFor(metric) },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "nearest", intersect: false },
      plugins: {
        legend: { position: "bottom", labels: { color: "#c7ccd3", boxWidth: 12, usePointStyle: true, pointStyle: "line" } },
        tooltip: { callbacks: { label: c => `${c.dataset.label}: ${c.parsed.y == null ? "—" : fmt(c.parsed.y)}` } },
      },
      scales: {
        x: { grid: { color: "#20242c" }, ticks: { color: "#8a9099", maxRotation: 0, autoSkipPadding: 24 } },
        y: { grid: { color: "#20242c" }, ticks: { color: "#8a9099", callback: v => fmt(v) },
             title: { display: true, text: metricLabel() + " HKB value", color: "#8a9099" } },
      },
    },
  };
  if (chart) chart.destroy();
  chart = new Chart(ctx, cfg);
}

function setMetric(k){
  metric = k;
  document.querySelectorAll(".seg").forEach(b => b.classList.toggle("active", b.dataset.k === k));
  draw();
}

function toggleAll(show){
  chart.data.datasets.forEach((_, i) => { chart.getDatasetMeta(i).hidden = show ? false : true; });
  chart.update();
}

function coverageCell(m, r){
  const warn = m < r ? " warn" : "";
  return `<td class="num cov${warn}">${m}/${r}</td>`;
}

function render(){
  const meta = document.getElementById("meta");
  const content = document.getElementById("content");

  if (DATA.empty){
    meta.innerHTML = `No team-value data yet · <a href="index.html">Projection accuracy →</a>`;
    content.innerHTML = `<div class="empty">The Team Value Store is empty. Run <code>team-values</code> daily — the chart appears once the first day is captured.</div>`;
    return;
  }

  const span = DATA.first_date === DATA.last_date ? DATA.first_date : `${DATA.first_date} → ${DATA.last_date}`;
  meta.innerHTML = `${DATA.dates.length} day(s) · ${span} · ${DATA.teams.length} teams · <a href="index.html">Projection accuracy →</a>`;

  const segs = METRICS.map(m =>
    `<button class="seg${m[0]==="total"?" active":""}" data-k="${m[0]}">${m[1]}</button>`).join("");

  const thin = DATA.dates.length < 5
    ? `<p class="note">Collecting data since ${DATA.first_date} — this series accumulates one point per day (HKB has no history), so the trend fills in over the coming days.</p>`
    : "";

  const rows = DATA.latest.map((r, i) => {
    const badge = r.logo
      ? `<img class="logo" src="${r.logo}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'swatch',style:'background:${r.color}'}))"/>`
      : `<span class="swatch" style="background:${r.color}"></span>`;
    return `<tr class="${i===0?"lead":""}">
      <td><div class="team">${badge}<span>${r.name || r.team}</span></div></td>
      <td class="num">${fmt(r.total)}</td>
      <td class="num">${fmt(r.mlb)}</td>
      <td class="num">${fmt(r.minors)}</td>
      <td class="num">${fmt(r.hitter)}</td>
      <td class="num">${fmt(r.pitcher)}</td>
      ${coverageCell(r.matched, r.rostered)}
    </tr>`;
  }).join("");

  content.innerHTML = `
    ${thin}
    <div class="controls">
      <div class="grp"><span class="lbl">Metric</span>${segs}</div>
      <div class="grp"><span class="lbl">Teams</span>
        <button class="mini" id="allBtn">All</button>
        <button class="mini" id="noneBtn">None</button>
      </div>
    </div>
    <section class="panel">
      <div class="chartwrap"><canvas id="valueChart"></canvas></div>
    </section>
    <section class="panel">
      <h2>Standings — ${DATA.last_date} <span class="cov" style="font-weight:400">(HKB dynasty value)</span></h2>
      <table>
        <thead><tr>
          <th>Team</th><th class="num">Total</th><th class="num">MLB</th><th class="num">Minors</th>
          <th class="num">Hitter</th><th class="num">Pitcher</th><th class="num">Matched</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <p class="sub" style="margin:10px 2px 0">Matched = players joined to an HKB value / total rostered. A shortfall means the value totals undercount by the unmatched players.</p>
    </section>`;

  document.querySelectorAll(".seg").forEach(b => b.addEventListener("click", () => setMetric(b.dataset.k)));
  document.getElementById("allBtn").addEventListener("click", () => toggleAll(true));
  document.getElementById("noneBtn").addEventListener("click", () => toggleAll(false));
  draw();
}

render();
</script>
</body>
</html>
