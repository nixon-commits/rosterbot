<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Projection Accuracy</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC" crossorigin="anonymous"></script>
<style>
  :root { --bg:#0f1115; --card:#181b22; --ink:#e6e8eb; --muted:#9aa0a8; --accent:#4f9dff; --warn:#ffb454; --good:#5fd38d; --bad:#ff6b6b; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
  header { padding:20px 24px; border-bottom:1px solid #23262e; }
  h1 { margin:0 0 4px; font-size:20px; }
  .sub { color:var(--muted); font-size:13px; }
  main { max-width:1100px; margin:0 auto; padding:20px 24px 60px; }
  .controls { display:flex; gap:24px; flex-wrap:wrap; margin:16px 0 24px; }
  .grp { display:flex; gap:6px; align-items:center; }
  .grp .lbl { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.05em; margin-right:4px; }
  button.seg { background:var(--card); color:var(--ink); border:1px solid #2a2e37; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:13px; }
  button.seg.active { background:var(--accent); border-color:var(--accent); color:#06101f; font-weight:600; }
  .cards { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .card { background:var(--card); border:1px solid #23262e; border-radius:10px; padding:14px 16px; }
  .card .k { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.05em; }
  .card .v { font-size:26px; font-weight:700; margin-top:4px; }
  .card .d { font-size:12px; margin-top:2px; }
  .d.good { color:var(--good); } .d.bad { color:var(--bad); } .d.flat { color:var(--muted); }
  section.panel { background:var(--card); border:1px solid #23262e; border-radius:10px; padding:16px; margin-top:20px; }
  section.panel h2 { margin:0 0 12px; font-size:15px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:6px 8px; border-bottom:1px solid #23262e; }
  th.sortable { cursor:pointer; user-select:none; }
  th.sortable:hover { color:var(--ink); }
  th { color:var(--muted); font-weight:600; }
  th.num,td.num { text-align:right; }
  td.num { font-variant-numeric:tabular-nums; }
  .over { color:var(--bad); } .under { color:var(--good); }
  tr.best td { background:rgba(95,211,141,0.10); }
  tr.best td:first-child { box-shadow:inset 3px 0 0 var(--good); }
  .swatch { display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:6px; vertical-align:middle; }
  .pill { font-size:11px; color:var(--good); border:1px solid var(--good); border-radius:10px; padding:1px 6px; margin-left:6px; }
  .pill.prod { color:var(--accent); border-color:var(--accent); }
  ul.insights { list-style:none; margin:0; padding:0; }
  ul.insights li { padding:8px 12px; border-radius:8px; margin-bottom:8px; background:#1d2129; border-left:3px solid var(--accent); }
  ul.insights li.warn { border-left-color:var(--warn); }
  .empty { color:var(--muted); padding:24px; text-align:center; }
  .chartwrap { position:relative; height:280px; }
</style>
</head>
<body>
<header>
  <h1>Projection Accuracy</h1>
  <div class="sub" id="meta"></div>
  <div class="sub" style="margin-top:6px"><a href="value.html" style="color:var(--accent);text-decoration:none">Team value tracker →</a></div>
</header>
<main>
  <div class="controls">
    <div class="grp"><span class="lbl">Window</span><div id="winseg"></div></div>
    <div class="grp"><span class="lbl">Players</span><div id="roleseg"></div></div>
  </div>

  <section class="panel" id="comparePanel">
    <h2>Projection system comparison <span class="sub" id="compareSub"></span></h2>
    <div id="compareTable"></div>
    <div class="chartwrap" style="margin-top:14px"><canvas id="compareChart"></canvas></div>
  </section>

  <div class="controls" style="margin:28px 0 4px">
    <div class="grp"><span class="lbl">System</span><div id="sysseg"></div></div>
  </div>
  <h2 style="font-size:15px;margin:8px 0 4px">Detail — <span id="detailSysLabel"></span></h2>
  <div class="sub" style="margin-bottom:12px" id="detailSub"></div>
  <div id="scorecard" class="cards"></div>

  <section class="panel"><h2 id="trendTitle">Rolling accuracy over the season</h2><div class="chartwrap"><canvas id="trendChart"></canvas></div></section>
  <section class="panel"><h2>Accuracy by position</h2><div class="chartwrap"><canvas id="posChart"></canvas></div></section>
  <section class="panel" id="calib"><h2>Calibration — projected vs actual</h2><div class="chartwrap"><canvas id="calibChart"></canvas></div></section>
  <section class="panel" id="insights"><h2>Insights</h2><ul class="insights" id="insightList"></ul></section>
  <section class="panel" id="misses"><h2>Worst misses</h2><div id="missTable"></div></section>
</main>

<script>
const MODEL = {{.Data}};

let state = { window: 7, role: "all", system: null };
let charts = {};

// Draws a faint vertical crosshair at the hovered x on a line chart, so the
// index-mode tooltip's per-series values read against a clear reference line.
const vLine = {
  id: "vLine",
  afterDraw(chart) {
    const t = chart.tooltip;
    const active = t && t.getActiveElements ? t.getActiveElements() : [];
    if (!active.length) return;
    const x = active[0].element.x;
    const ctx = chart.ctx;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x, chart.scales.y.top);
    ctx.lineTo(x, chart.scales.y.bottom);
    ctx.lineWidth = 1;
    ctx.strokeStyle = "rgba(230,232,235,0.35)";
    ctx.stroke();
    ctx.restore();
  }
};

const fmt = (x, d=1) => (x===0?0:x).toFixed(d);
const winLabel = w => w<=0 ? "Season" : w+"d";

function seg(containerId, items, key) {
  const c = document.getElementById(containerId);
  c.innerHTML = "";
  items.forEach(it => {
    const b = document.createElement("button");
    b.className = "seg" + (state[key]==it.val ? " active" : "");
    b.textContent = it.label;
    b.onclick = () => { state[key] = it.val; render(); };
    c.appendChild(b);
  });
}

function deltaCell(cur, prior, lowerBetter=true) {
  if (!prior || prior===0) return '<div class="d flat">—</div>';
  const diff = cur - prior;
  const improved = lowerBetter ? diff < 0 : diff > 0;
  const cls = Math.abs(diff) < 1e-9 ? "flat" : (improved ? "good" : "bad");
  const sign = diff > 0 ? "+" : "";
  return '<div class="d '+cls+'">'+sign+fmt(diff,2)+' vs prior</div>';
}

function renderScorecard(v) {
  const s = v.scorecard, c = s.cur, p = s.prior;
  const el = document.getElementById("scorecard");
  if (!c || c.n===0) { el.innerHTML = '<div class="empty" style="grid-column:1/-1">No graded data in this window yet.</div>'; return; }
  el.innerHTML = `
    <div class="card"><div class="k">MAE</div><div class="v">${fmt(c.mae)}</div>${deltaCell(c.mae,p.mae,true)}</div>
    <div class="card"><div class="k">Bias</div><div class="v">${fmt(c.bias)}</div>${deltaCell(Math.abs(c.bias),Math.abs(p.bias),true)}</div>
    <div class="card"><div class="k">RMSE</div><div class="v">${fmt(c.rmse)}</div>${deltaCell(c.rmse,p.rmse,true)}</div>
    <div class="card"><div class="k">Sample (player-days)</div><div class="v">${c.n.toLocaleString()}</div><div class="d flat">prior ${p.n.toLocaleString()}</div></div>`;
}

function destroy(id){ if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

// Deterministic per-system colors, assigned by position in MODEL.systems so a
// system keeps its color across window/role toggles.
const SYS_PALETTE = ["#4f9dff","#5fd38d","#ffb454","#ff6b6b","#b48bff","#3fd0d0"];
function sysColor(sys) {
  const i = (MODEL.systems || []).indexOf(sys);
  return SYS_PALETTE[(i < 0 ? 0 : i) % SYS_PALETTE.length];
}
function sysLabel(sys) { return sys.replace(/-ros$/, " RoS"); }

function renderCompare() {
  const key = state.window+"|"+state.role;
  const scores = (MODEL.compare && MODEL.compare[key]) || [];
  const sub = document.getElementById("compareSub");
  const withData = scores.filter(s => s.n > 0);
  sub.textContent = withData.length
    ? "· ranked by MAE (lower = better) · " + winLabel(state.window) + " · " + state.role
    : "";

  // Ranking table.
  const el = document.getElementById("compareTable");
  if (!withData.length) {
    el.innerHTML = '<div class="empty">No graded data across systems in this window yet.</div>';
  } else {
    const head = '<tr><th>System</th><th class="num">MAE</th><th class="num">Bias</th><th class="num">RMSE</th><th class="num">Sample</th></tr>';
    const body = scores.map(s => {
      if (s.n === 0) return "";
      const prod = s.system === MODEL.detailSystem ? '<span class="pill prod">prod</span>' : "";
      const best = s.best ? '<span class="pill">best</span>' : "";
      const sw = '<span class="swatch" style="background:'+sysColor(s.system)+'"></span>';
      return '<tr class="'+(s.best?"best":"")+'"><td>'+sw+escapeHtml(sysLabel(s.system))+prod+best+'</td>'+
        '<td class="num">'+fmt(s.mae,2)+'</td>'+
        '<td class="num">'+(s.bias>0?"+":"")+fmt(s.bias,2)+'</td>'+
        '<td class="num">'+fmt(s.rmse,2)+'</td>'+
        '<td class="num">'+s.n.toLocaleString()+'</td></tr>';
    }).join("");
    el.innerHTML = '<table><thead>'+head+'</thead><tbody>'+body+'</tbody></table>';
  }

  // Overlaid MAE trend, one line per system.
  destroy("compareChart");
  const trends = (MODEL.compareTrends && MODEL.compareTrends[key]) || {};
  // Union of all date labels across systems (sorted), so lines align on x.
  const labelSet = {};
  (MODEL.systems || []).forEach(sys => (trends[sys]||[]).forEach(p => labelSet[p.date] = true));
  const labels = Object.keys(labelSet).sort();
  const datasets = (MODEL.systems || []).map(sys => {
    const byDate = {};
    (trends[sys]||[]).forEach(p => byDate[p.date] = p.mae);
    return {
      label: sysLabel(sys),
      data: labels.map(d => d in byDate ? byDate[d] : null),
      borderColor: sysColor(sys), backgroundColor: sysColor(sys),
      pointRadius: 0, tension: .25, spanGaps: true,
      borderWidth: sys === MODEL.detailSystem ? 3 : 1.5,
    };
  });
  charts.compareChart = new Chart(document.getElementById("compareChart"), {
    type: "line",
    data: { labels, datasets },
    plugins: [vLine],
    options: {
      maintainAspectRatio:false,
      interaction: { mode:"index", intersect:false },
      scales:{ x:{ ticks:{ color:"#9aa0a8", maxTicksLimit:10 } }, y:{ title:{display:true,text:"MAE",color:"#9aa0a8"}, ticks:{ color:"#9aa0a8" } } },
      plugins:{
        legend:{ labels:{ color:"#e6e8eb" } },
        tooltip:{ callbacks:{ label: ctx => ctx.dataset.label + ": " + (ctx.parsed.y==null?"—":fmt(ctx.parsed.y, 2)) } }
      }
    }
  });
}

function renderTrend() {
  const tp = MODEL.trends[state.system+"|"+state.window+"|"+state.role] || [];
  document.getElementById("trendTitle").textContent =
    (state.window<=0 ? "Rolling 7-day accuracy over the season" : "Daily accuracy — last "+state.window+" days");
  destroy("trendChart");
  charts.trendChart = new Chart(document.getElementById("trendChart"), {
    type: "line",
    data: { labels: tp.map(p=>p.date), datasets: [
      { label:"MAE", data: tp.map(p=>p.mae), borderColor:"#4f9dff", backgroundColor:"#4f9dff", pointRadius:0, tension:.25 },
      { label:"Bias", data: tp.map(p=>p.bias), borderColor:"#ffb454", backgroundColor:"#ffb454", pointRadius:0, tension:.25 },
    ]},
    plugins: [vLine],
    options: {
      maintainAspectRatio:false,
      interaction: { mode:"index", intersect:false },
      scales:{ x:{ ticks:{ color:"#9aa0a8", maxTicksLimit:10 } }, y:{ ticks:{ color:"#9aa0a8" } } },
      plugins:{
        legend:{ labels:{ color:"#e6e8eb" } },
        tooltip:{ callbacks:{ label: ctx => ctx.dataset.label + ": " + fmt(ctx.parsed.y, 2) } }
      }
    }
  });
}

function renderPos(v) {
  destroy("posChart");
  charts.posChart = new Chart(document.getElementById("posChart"), {
    type: "bar",
    data: { labels: v.byPos.map(p=>p.bucket), datasets: [
      { label:"MAE", data: v.byPos.map(p=>p.mae), backgroundColor:"#4f9dff" },
      { label:"Bias", data: v.byPos.map(p=>p.bias), backgroundColor:"#ffb454" },
    ]},
    options: { maintainAspectRatio:false, scales:{ x:{ ticks:{ color:"#9aa0a8" } }, y:{ ticks:{ color:"#9aa0a8" } } }, plugins:{ legend:{ labels:{ color:"#e6e8eb" } } } }
  });
}

function renderCalib(v) {
  destroy("calibChart");
  const pts = v.calib.map(p=>({x:p.proj, y:p.actual, n:p.n}));
  let max = 1;
  pts.forEach(p=>{ max = Math.max(max, p.x, p.y); });
  charts.calibChart = new Chart(document.getElementById("calibChart"), {
    type: "scatter",
    data: { datasets: [
      { label:"avg actual per projected bucket", data: pts, backgroundColor:"#5fd38d", pointRadius:5 },
      { label:"perfect (y=x)", type:"line", data:[{x:0,y:0},{x:max,y:max}], borderColor:"#9aa0a8", borderDash:[5,5], pointRadius:0 },
    ]},
    options: { maintainAspectRatio:false, scales:{ x:{ title:{display:true,text:"projected",color:"#9aa0a8"}, ticks:{ color:"#9aa0a8" } }, y:{ title:{display:true,text:"actual",color:"#9aa0a8"}, ticks:{ color:"#9aa0a8" } } }, plugins:{ legend:{ labels:{ color:"#e6e8eb" } }, tooltip:{ callbacks:{ label: ctx => ctx.datasetIndex===0 ? ("proj "+ctx.raw.x.toFixed(1)+" → actual "+ctx.raw.y.toFixed(1)+"  (n="+ctx.raw.n+")") : "y=x" } } } }
  });
}

function renderInsights(v) {
  const ul = document.getElementById("insightList");
  if (!v.insights || v.insights.length===0) { ul.innerHTML = '<li class="flat">No notable signals in this window.</li>'; return; }
  ul.innerHTML = v.insights.map(i => '<li class="'+(i.severity==="warn"?"warn":"")+'">'+escapeHtml(i.text)+'</li>').join("");
}

// Worst-misses table state. key=null keeps the server order (by |diff| desc).
let lastMisses = [];
let missSort = { key: null, dir: "desc" };
const missCols = [["name","Player",""],["bucket","Pos",""],["date","Date",""],["projected","Proj","num"],["actual","Actual","num"],["diff","Diff","num"]];

function sortMisses(key) {
  if (missSort.key === key) {
    missSort.dir = missSort.dir === "asc" ? "desc" : "asc";
  } else {
    missSort.key = key;
    // text columns default ascending, numeric columns descending (biggest first)
    missSort.dir = (key==="name"||key==="bucket"||key==="date") ? "asc" : "desc";
  }
  drawMisses();
}

function drawMisses() {
  const el = document.getElementById("missTable");
  const data = lastMisses.slice();
  if (missSort.key) {
    const k = missSort.key, num = (k==="projected"||k==="actual"||k==="diff");
    data.sort((a,b) => {
      const c = num ? (a[k]-b[k]) : String(a[k]).localeCompare(String(b[k]));
      return missSort.dir==="asc" ? c : -c;
    });
  }
  const arrow = k => missSort.key===k ? (missSort.dir==="asc"?" ▲":" ▼") : "";
  const head = missCols.map(([k,label,c]) =>
    '<th class="'+(c?c+" ":"")+'sortable" onclick="sortMisses(\''+k+'\')">'+label+arrow(k)+'</th>').join("");
  const rows = data.map(m => {
    const cls = m.diff < 0 ? "over" : "under";
    return '<tr><td>'+escapeHtml(m.name)+'</td><td>'+escapeHtml(m.bucket)+'</td><td>'+escapeHtml(m.date)+'</td>'+
      '<td class="num">'+fmt(m.projected)+'</td><td class="num">'+fmt(m.actual)+'</td>'+
      '<td class="num '+cls+'">'+(m.diff>0?"+":"")+fmt(m.diff)+'</td></tr>';
  }).join("");
  el.innerHTML = '<table><thead><tr>'+head+'</tr></thead><tbody>'+rows+'</tbody></table>';
}

function renderMisses(v) {
  if (!v.misses || v.misses.length===0) {
    lastMisses = [];
    document.getElementById("missTable").innerHTML = '<div class="empty">No data.</div>';
    return;
  }
  lastMisses = v.misses;
  drawMisses();
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function render() {
  seg("winseg", MODEL.windows.map(w=>({val:w,label:winLabel(w)})), "window");
  seg("roleseg", MODEL.roles.map(r=>({val:r,label:r[0].toUpperCase()+r.slice(1)})), "role");
  seg("sysseg", (MODEL.systems||[]).map(s=>({val:s,label:sysLabel(s)})), "system");
  renderCompare();
  document.getElementById("detailSysLabel").textContent = sysLabel(state.system || "");
  document.getElementById("detailSub").textContent = state.system === MODEL.detailSystem
    ? "The bot's production projection, broken down below."
    : "Captured for comparison — not used in production lineups.";
  const v = MODEL.views[state.system+"|"+state.window+"|"+state.role];
  renderScorecard(v);
  renderTrend();
  renderPos(v);
  renderCalib(v);
  renderInsights(v);
  renderMisses(v);
}

document.getElementById("meta").textContent =
  "Latest graded: " + MODEL.latestDate + " · season since " + MODEL.seasonStart + " · generated " + MODEL.generatedAt;
// Prefer the production system, but only if it actually has captured rows;
// otherwise fall back to whichever system does, so the page never lands on an
// empty Detail view while other systems have real data.
const sysList = MODEL.systems || [];
state.system = sysList.includes(MODEL.detailSystem) ? MODEL.detailSystem : (sysList[0] || MODEL.detailSystem || "");
render();
</script>
</body>
</html>
